name: Build desktop artifacts

on:
  workflow_dispatch:

jobs:
  macos-universal:
    name: macOS universal DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri -- build --target universal-apple-darwin --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: moonytask-macos-universal-dmg
          path: src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri -- build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: moonytask-windows-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
          if-no-files-found: error

  linux-x64:
    name: Linux x64 AppImage, DEB, RPM
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles appimage,deb,rpm

      - uses: actions/upload-artifact@v4
        with:
          name: moonytask-linux-x64
          path: |
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
          if-no-files-found: error
